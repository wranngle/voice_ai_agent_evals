# agent-registry.example.yaml
#
# OPERATOR CONVENTION — this file is documentation, not a harness-loaded
# config. No code in lib/, scripts/, or tests/ parses agent-registry.yaml.
#
# What the harness actually reads:
#   - ELEVENLABS_AGENT_ID  env var (default agent for the runner scripts)
#   - ELEVENLABS_API_KEY   env var
#   - N8N_API_URL, N8N_API_KEY env vars (for n8n-eval / mcp runners)
#
# What this file is for:
#   A place to keep your live agent IDs / voice IDs / tool URL bindings in
#   source control alongside your prompts, so reviewers can see the agent's
#   shape at a glance and so per-prompt-tag rollbacks have a structured
#   record of what the agent looked like at that revision. Your own deploy
#   pipeline reads this file (or its real sibling agent-registry.yaml,
#   which is gitignored); the harness does not.

agents:
  - id: agent_xxxx_demo
    name: PrimaryAgent (placeholder)
    role: inbound-voice-sdr
    voice: voice_xxxx_demo
    llm: gemini-3-flash-preview
    phone: "+15550100"
    knowledge_base:
      - kb_xxxx_demo
    tools:
      - name: lookup_record
        description: "Look up an account record by id."
        type: server-side
        url: "${TOOL_LOOKUP_URL}"
        parameters:
          type: object
          properties:
            id:
              type: string
              description: "Record id."
          required: [id]
        response_timeout_secs: 5
      - name: send_sms
        description: "Send an SMS to the caller."
        type: server-side
        url: "${TOOL_SEND_SMS_URL}"
        parameters:
          type: object
          properties:
            phone_number:
              type: string
            message:
              type: string
          required: [phone_number, message]
        response_timeout_secs: 8
    # Convention: keep your prompt source file alongside the registry and
    # tag every change `prompt/<name>/v<N>` so rollbacks are addressable.
    prompt_ref: prompts/primary.md

  - id: agent_yyyy_demo
    name: SecondaryAgent (placeholder)
    role: outbound-callback
    voice: voice_yyyy_demo
    llm: gemini-3-flash-preview
    phone: "+15550101"
    knowledge_base: []
    tools: []
    prompt_ref: prompts/secondary.md
