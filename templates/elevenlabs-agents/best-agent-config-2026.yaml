# =============================================================================
# First Message Templates
# =============================================================================
first_message_templates:
  inbound_general: "Hello! Thanks for calling. How can I help you today?"

  outbound_lead: "Hi, this is {agent_name} from {company}. Am I speaking with {contact_name}?"

  outbound_followup: "Hi {contact_name}, this is {agent_name} from {company}. I'm following up on our recent conversation. Do you have a moment?"

  appointment_reminder: "Hi {contact_name}, this is {agent_name} from {company}. I'm calling to confirm your appointment on {date} at {time}. Can you confirm you'll be there?"

# =============================================================================
# Usage Notes
# =============================================================================
#
# 1. VOICE CLONING: For branded experiences, clone the client's preferred voice
#    using mcp__elevenlabs-mcp__voice_clone with 3+ audio samples
#
# 2. WEBHOOKS: Configure post-call webhooks to capture:
#    - call_completed (with transcript)
#    - call_failed (with error details)
#    - Webhook URL format: https://n8n.example.com/webhook/elevenlabs-call-completed
#
# 3. TOOLS: Connect n8n workflows as MCP tools for:
#    - send_sms: Calendar link delivery
#    - book_appointment: Direct calendar integration
#    - lookup_customer: CRM data injection
#
# 4. NAMING CONVENTION: agents you don't want this harness to touch
#    should be tagged in your registry/dashboard so the runner can skip
#    them. The harness itself is name-agnostic.
#
# 5. TESTING: drop scenario YAMLs under tests/scenarios/<scenario-id>/
#    using tests/scenarios/_template/scenario.yaml as the starting shape.
