<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ElevenLabs Widget & UI Showcase</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span> ElevenLabs <strong>Widget &amp; UI Showcase</strong>
      <span class="agent-chip" id="agentChip">agent: …</span>
    </div>
    <nav class="topnav">
      <a href="#start">Start here</a>
      <a href="#embed">Connect</a>
      <a href="#attributes">Widget knobs</a>
      <a href="#text">Wording</a>
      <a href="#avatar">Avatar</a>
      <a href="#modality">Voice/Chat</a>
      <a href="#runtime">Overrides</a>
      <a href="#api">API panel</a>
      <a href="#url">Share via URL</a>
      <a href="/react.html">React hooks →</a>
      <a href="/ui-library.html">UI components →</a>
      <a href="/examples.html">Examples →</a>
      <a href="/blocks.html">Blocks →</a>
    </nav>
  </header>

  <h1 class="visually-hidden">ElevenLabs Widget &amp; UI Showcase</h1>
  <div class="layout">
    <main id="panels" aria-label="Widget controls"><!-- populated by app.js --></main>

    <aside class="preview">
      <div class="preview-head">
        <span>Live widget</span>
        <div class="preview-actions">
          <button id="btnRemount" title="Rebuild the element (reloads config)">⟳ remount</button>
          <button id="btnReset" title="Reset all knobs to defaults">reset</button>
        </div>
      </div>
      <div class="preview-stage" id="stage"><!-- <elevenlabs-convai> mounts here --></div>
      <div class="inspector">
        <div class="inspector-head">
          <span>Merged config (live)</span>
          <button id="btnCopyCfg">copy</button>
        </div>
        <pre id="cfgInspector">{}</pre>
      </div>
    </aside>
  </div>

  <script src="/app.js" type="module"></script>
</body>
</html>
