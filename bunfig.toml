# Bun configuration. See: https://bun.sh/docs/runtime/bunfig
#
# Note: this project's test runner is Vitest, not `bun test`. The [install]
# block governs `bun install` and is what we actually rely on; no [test]
# block is needed.

[install]
# Use exact versions for reproducibility — pairs with the bun.lock /
# package.json `"devDependencies": {...}` exact-pinning across the repo
# (see git log for the dep audits).
exact = true
