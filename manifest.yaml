# voice_ai_agent_evals — eval harness manifest

name: voice_ai_agent_evals
description: >
  Bulk evaluation harness for ElevenLabs Conversational AI voice agents.
  Deterministic scenarios, latency budgets, prompt versioning via git tags.

components:
  transcript-field-extractor:
    status: example
    description: Extracts structured data from ElevenLabs voice transcripts using bulk LLM prompts.
    integrations:
      - elevenlabs
    capabilities:
      - transcript-extraction
      - llm-data-parsing

  voice-agent-tester:
    status: example
    description: Runs scenario YAMLs against an ElevenLabs agent, scores against latency + voice axes.
    integrations:
      - elevenlabs
    capabilities:
      - regression-evals
      - latency-budget-enforcement
