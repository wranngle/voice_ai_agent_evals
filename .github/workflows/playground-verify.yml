name: playground-verify

# Run the playground's full verification gate (Playwright + headless Chromium)
# on every PR that touches the playground. Requires the repo secret
# ELEVENLABS_API_KEY (single setting key) — the only auth bit the proxy needs.
# Does NOT exercise /api/extract-form or /api/voice-nav (those need llm.sh on
# the runner); the other 9 proxy endpoints + 11/11 verify + 7/7 live probes
# + axe a11y (4 views, no serious/critical) + mobile responsive sweep
# (12 viewport×view stops, no h-scroll/pageerrors) all run against the
# live ElevenLabs API.

on:
  pull_request:
    paths:
      - 'playground/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/playground-verify.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playground-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Check ELEVENLABS_API_KEY presence
        id: secret-check
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          if [ -z "$ELEVENLABS_API_KEY" ]; then
            echo "::warning::ELEVENLABS_API_KEY not configured as a repo secret — skipping live verify. Set it in repo Settings → Secrets to activate this gate."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright Chromium
        if: steps.secret-check.outputs.skip != 'true'
        run: bunx playwright@latest install --with-deps chromium

      - name: Start playground server (background)
        if: steps.secret-check.outputs.skip != 'true'
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          nohup bun run playground/server.ts > /tmp/playground.log 2>&1 &
          for _ in {1..30}; do
            if curl -s -o /dev/null -w '%{http_code}' http://localhost:4321/ | grep -q 200; then
              echo "server up"; exit 0
            fi
            sleep 1
          done
          echo "server failed to start"
          cat /tmp/playground.log
          exit 1

      - name: Run playground:verify-all (verify + live-probe + a11y + mobile)
        if: steps.secret-check.outputs.skip != 'true'
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: bun run playground/verify-all.mjs

      - name: Upload audit + verify screenshots on failure
        if: failure() && steps.secret-check.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: playground-evidence-${{ github.run_number }}
          path: |
            playground/audit/
            playground/verify/
            /tmp/playground.log
          retention-days: 14
