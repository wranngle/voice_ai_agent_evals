name: CI - Webhook Validation

on:
  push:
    branches: [main, reorganize-project-structure]
    paths:
      - 'workflows/voice_ai_agents/**'
  pull_request:
    branches: [main]
    paths:
      - 'workflows/voice_ai_agents/**'
  workflow_dispatch:

jobs:
  validate-workflow-json:
    name: Validate Workflow JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          echo "Checking workflow JSON files..."
          for f in workflows/voice_ai_agents/supersystem/*.json; do
            if [ -f "$f" ]; then
              echo "Validating: $f"
              python3 -m json.tool "$f" > /dev/null || exit 1
            fi
          done
          echo "All JSON files are valid"

      - name: Check required fields
        run: |
          echo "Checking required workflow fields..."
          for f in workflows/voice_ai_agents/supersystem/*-prod.json; do
            if [ -f "$f" ]; then
              echo "Checking: $f"
              # Check for required fields
              if ! grep -q '"name"' "$f"; then echo "Missing name in $f"; exit 1; fi
              if ! grep -q '"nodes"' "$f"; then echo "Missing nodes in $f"; exit 1; fi
              if ! grep -q '"connections"' "$f"; then echo "Missing connections in $f"; exit 1; fi
              echo "✓ $f has required fields"
            fi
          done

  test-webhook:
    name: Test Webhook (Integration)
    runs-on: ubuntu-latest
    # Only run on manual trigger or main branch
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run webhook tests
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
        run: |
          if [ -z "$N8N_WEBHOOK_URL" ]; then
            echo "N8N_WEBHOOK_URL secret not set, using default"
            export N8N_WEBHOOK_URL="https://your-n8n-host.example.com/webhook/client-initiation-data"
          fi
          chmod +x workflows/voice_ai_agents/tests/quick-test.sh
          cd workflows/voice_ai_agents && bash tests/quick-test.sh

  lint-code-nodes:
    name: Lint Code Nodes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract and lint JavaScript code
        run: |
          echo "Extracting JavaScript from Code nodes..."
          for f in workflows/voice_ai_agents/supersystem/*.json; do
            if [ -f "$f" ]; then
              echo "Processing: $f"
              # Extract jsCode fields and check for basic syntax
              node -e "
                const fs = require('fs');
                const data = JSON.parse(fs.readFileSync('$f', 'utf8'));
                const codeNodes = data.nodes?.filter(n => n.type === 'n8n-nodes-base.code') || [];
                codeNodes.forEach((node, i) => {
                  const code = node.parameters?.jsCode;
                  if (code) {
                    try {
                      new Function(code);
                      console.log('✓ ' + node.name + ': syntax OK');
                    } catch (e) {
                      console.error('✗ ' + node.name + ': ' + e.message);
                      process.exit(1);
                    }
                  }
                });
              "
            fi
          done

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          # Check for common secret patterns
          patterns=(
            "sk_live_"
            "sk_test_"
            "AKIA[A-Z0-9]"
            "password.*="
            "api_key.*="
          )
          found=0
          for pattern in "${patterns[@]}"; do
            if grep -rn "$pattern" workflows/voice_ai_agents --include="*.json" --include="*.ts" --include="*.js" 2>/dev/null; then
              echo "WARNING: Found potential secret pattern: $pattern"
              found=1
            fi
          done
          if [ $found -eq 1 ]; then
            echo "::warning::Potential secrets found in code. Please review."
          else
            echo "✓ No obvious secrets found"
          fi
