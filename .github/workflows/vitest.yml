name: voice-ai-vitest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    # Hands-free monitoring: run every day at 11:00 UTC
    - cron: '0 11 * * *'

permissions:
  contents: read

jobs:
  unit-tests-bun:
    name: Offline (Bun 1.1)
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@8f24390df009a496891208e5e36b8a1de1f45135  # v1.2.2
        with:
          bun-version: '1.1'
      - name: Install dependencies
        run: bun install
      - name: Run vitest offline projects (Bun)
        id: vitest
        run: |
          bun run vitest run \
            --project ingestion \
            --project integration \
            --project governance \
            --project agent_evals \
            --project elevenlabs \
            --project n8n-eval \
            --project mcp \
            --project wrapper \
            --project scoring \
            --project ingestion-llm \
            --project regression \
            --project remediation \
            --project cli \
            --project factory \
            --project n8n \
            --project _meta_audit \
            2>&1 | tee /tmp/vitest-bun.log
      - name: Write GITHUB_STEP_SUMMARY
        if: always()
        run: |
          {
            echo "## Voice AI Eval Harness — vitest (Bun) summary"
            echo ""
            echo '```'
            tail -40 /tmp/vitest-bun.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unit-tests-node:
    name: Offline (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm install
      - name: Run vitest offline projects (Node ${{ matrix.node }})
        run: |
          npx vitest run \
            --project ingestion \
            --project integration \
            --project governance \
            --project agent_evals \
            --project elevenlabs \
            --project n8n-eval \
            --project mcp \
            --project wrapper \
            --project scoring \
            --project ingestion-llm \
            --project regression \
            --project remediation \
            --project cli \
            --project factory \
            --project n8n \
            --project _meta_audit \
            2>&1 | tee /tmp/vitest-node.log
      - name: Write GITHUB_STEP_SUMMARY
        if: always()
        run: |
          {
            echo "## Voice AI Eval Harness — vitest (Node ${{ matrix.node }}) summary"
            echo ""
            echo '```'
            tail -40 /tmp/vitest-node.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  live-tests:
    name: Live (network + secrets)
    runs-on: ubuntu-latest
    needs: [unit-tests-bun, unit-tests-node]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@8f24390df009a496891208e5e36b8a1de1f45135  # v1.2.2
        with:
          bun-version: '1.1'
      - name: Install dependencies
        run: bun install
      - name: Verify secrets
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          if [ -z "${N8N_API_KEY:-}" ] && [ -z "${ELEVENLABS_API_KEY:-}" ]; then
            echo "No live secrets configured; skipping live job"
            exit 0
          fi
      - name: Run vitest live projects
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          bun run vitest run \
            --project webhook \
            2>&1 | tee /tmp/vitest-live.log
      - name: Write GITHUB_STEP_SUMMARY
        if: always()
        run: |
          {
            echo "## Voice AI Eval Harness — live tests summary"
            echo ""
            echo '```'
            tail -40 /tmp/vitest-live.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
