name: voice-ai-vitest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    # Hands-free monitoring: run every day at 11:00 UTC
    - cron: '0 11 * * *'

jobs:
  unit-tests:
    name: Offline (vitest projects)
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1'
      - name: Install dependencies
        run: bun install
      - name: Run vitest offline projects
        id: vitest
        run: |
          bun run vitest run \
            --project ingestion \
            --project integration \
            --project governance \
            --project agent_evals \
            2>&1 | tee /tmp/vitest.log
      - name: Write GITHUB_STEP_SUMMARY
        if: always()
        run: |
          {
            echo "## Voice AI Eval Harness — vitest summary"
            echo ""
            echo '```'
            tail -40 /tmp/vitest.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  live-tests:
    name: Live (network + secrets)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1'
      - name: Install dependencies
        run: bun install
      - name: Verify secrets
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          if [ -z "${N8N_API_KEY:-}" ] && [ -z "${ELEVENLABS_API_KEY:-}" ]; then
            echo "No live secrets configured; skipping live job"
            exit 0
          fi
      - name: Run vitest live projects
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          bun run vitest run \
            --project webhook \
            --project elevenlabs \
            --project n8n-eval \
            --project mcp \
            2>&1 | tee /tmp/vitest-live.log
      - name: Write GITHUB_STEP_SUMMARY
        if: always()
        run: |
          {
            echo "## Voice AI Eval Harness — live tests summary"
            echo ""
            echo '```'
            tail -40 /tmp/vitest-live.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
