name: live-badge

on:
  schedule:
    # Daily liveness check at 13:00 UTC — exercises the bundled fixture
    # demo so the green badge proves the central promise still works
    # against current deps.
    - cron: '0 13 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - '.github/workflows/live-badge.yml'

permissions:
  contents: write

concurrency:
  group: live-badge
  cancel-in-progress: false

jobs:
  liveness:
    name: Bundled fixture demo
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CI: 'true'
      FIXTURE: .test-data/sample.wav
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: oven-sh/setup-bun@8f24390df009a496891208e5e36b8a1de1f45135  # v1.2.2
        with:
          bun-version: '1.1'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run bundled fixture demo
        id: demo
        run: |
          set -euo pipefail
          mkdir -p docs
          LOG="$(mktemp)"
          status="success"; color="brightgreen"; message="live"
          if [[ ! -f "$FIXTURE" ]]; then
            status="missing-fixture"; color="red"; message="no fixture"
          else
            bun src/cli.ts score "$FIXTURE" >"$LOG" 2>&1 || true
            if ! grep -q '^Audio: ' "$LOG"; then
              status="broken"; color="red"; message="parse failed"
            elif ! grep -qE '^[[:space:]]*[✓✗][[:space:]]+voice_activity_caller' "$LOG"; then
              status="broken"; color="red"; message="scorer missing"
            elif ! grep -qE '^[[:space:]]*[✓✗][[:space:]]+barge_in_recovery' "$LOG"; then
              status="broken"; color="red"; message="scorer missing"
            fi
          fi
          TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat >docs/live-status.json <<JSON
          {
            "schemaVersion": 1,
            "label": "live",
            "message": "$message",
            "color": "$color",
            "status": "$status",
            "fixture": "$FIXTURE",
            "checkedAt": "$TS"
          }
          JSON
          echo "live-badge: status=$status message=$message color=$color"
          cat docs/live-status.json
          if [[ "$status" != "success" ]]; then
            echo "::group::demo output"
            cat "$LOG"
            echo "::endgroup::"
            exit 1
          fi
      - name: Write GITHUB_STEP_SUMMARY
        if: always()
        run: |
          {
            echo "## voice-evals live badge"
            echo ""
            echo '```json'
            cat docs/live-status.json 2>/dev/null || echo '{"status":"missing"}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Commit live-status.json if changed
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet docs/live-status.json; then
            echo "No live-status.json change — skipping commit"
            exit 0
          fi
          git add docs/live-status.json
          git commit -m 'chore(voice-evals): refresh live-status badge'
          git push origin HEAD:main
