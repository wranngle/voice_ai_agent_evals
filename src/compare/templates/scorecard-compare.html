<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>voice-evals compare — {{SCENARIO}}</title>
<style>
  body { font: 14px/1.45 system-ui, -apple-system, sans-serif; margin: 2rem; color: #1a1a1a; }
  h1 { font-size: 1.4rem; margin: 0 0 0.5rem; }
  .scenario { color: #555; font-size: 0.9rem; margin-bottom: 1.5rem; }
  table { border-collapse: collapse; width: 100%; max-width: 960px; }
  th, td { border: 1px solid #ddd; padding: 0.5rem 0.75rem; text-align: left; vertical-align: top; }
  th { background: #f5f5f5; font-weight: 600; }
  th.delta, td.delta { background: #fafaff; }
  td.dim { font-weight: 500; }
  td.cell-passed { color: #056608; }
  td.cell-failed, td.cell-error { color: #a30000; }
  td.cell-missing { color: #999; font-style: italic; }
  td.delta-positive { color: #056608; }
  td.delta-negative { color: #a30000; }
  td.delta-zero { color: #555; }
  .summary { margin-top: 1.5rem; }
  .summary td.summary-passed { color: #056608; font-weight: 600; }
  .summary td.summary-failed, .summary td.summary-error { color: #a30000; font-weight: 600; }
  .meta { color: #888; font-size: 0.8rem; margin-top: 1.5rem; }
</style>
</head>
<body>
<h1>Comparative scorecard</h1>
<div class="scenario">Scenario: <code>{{SCENARIO}}</code> · Agents: {{AGENT_COUNT}}</div>

<table data-testid="compare-table">
  <thead>
    <tr>
      <th>Dimension</th>
      {{AGENT_HEADERS}}
      {{DELTA_HEADERS}}
    </tr>
  </thead>
  <tbody>
    {{ROWS}}
  </tbody>
</table>

<table class="summary" data-testid="compare-summary">
  <thead>
    <tr>
      <th>Agent</th>
      <th>Status</th>
      <th>Score</th>
      <th>Passed</th>
      <th>Failed</th>
    </tr>
  </thead>
  <tbody>
    {{SUMMARY_ROWS}}
  </tbody>
</table>

<div class="meta">Generated by @wranngle/voice-evals compare · {{TIMESTAMP}}</div>
</body>
</html>
